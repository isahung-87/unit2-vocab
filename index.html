<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=0">
    <title>Unit 2: Don't Worry. Be Happy! - 快樂學單字</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --dopamine-pink: #FF7EB9;
            --dopamine-yellow: #FFFB7D;
            --dopamine-cyan: #85FFBD;
            --dopamine-purple: #A29BFE;
        }

        body {
            -webkit-text-size-adjust: 100%;
            touch-action: manipulation;
            background-color: #F8FAFC;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* 翻牌動畫 */
        .card-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .card-flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .card-back {
            transform: rotateY(180deg);
        }

        .dopamine-gradient {
            background: linear-gradient(135deg, #85FFBD 0%, #FFFB7D 100%);
        }

        .btn-bounce:active {
            transform: scale(0.95);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }

        @keyframes success-pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .animate-success { animation: success-pulse 0.6s ease-out; }

        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }

        /* Chromebook / Tablet 優化 */
        @media (min-width: 768px) {
            .view-content { padding-top: 1rem; }
            #flashcard { max-width: 500px; margin: 0 auto; }
        }

        /* 記憶配對文字排版：絕對單行 */
        .game-card-text {
            display: inline-block;
            width: 100%;
            white-space: nowrap !important;
            word-break: keep-all !important;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: clamp(8px, 1.8vw, 18px);
        }
    </style>
</head>
<body class="overflow-x-hidden text-shadow-none">

    <!-- 頂部標題 -->
    <header class="safe-top bg-white border-b-4 border-yellow-300 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl md:text-2xl font-black text-pink-500 tracking-tighter italic">Unit 2: <span class="text-cyan-500">Don't Worry. Be Happy!</span></h1>
        <div id="compatibility-warning" class="hidden text-[10px] font-bold px-2 py-1 rounded-full bg-red-100 text-red-500">
            請確保使用 Chrome/Safari
        </div>
    </header>

    <!-- 主要視圖 -->
    <main id="app-container" class="max-w-4xl mx-auto p-4 mb-24">
        <div id="view-flashcards" class="view-content"></div>
        <div id="view-challenges" class="view-content hidden"></div>
        <div id="view-logs" class="view-content hidden"></div>
        <div id="view-game" class="view-content hidden"></div>
    </main>

    <!-- 底部導覽 -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t-4 border-pink-200 px-4 pt-2 pb-safe flex justify-around items-center z-50 shadow-lg">
        <button onclick="switchView('flashcards')" class="nav-item flex flex-col items-center p-2 text-pink-500">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"></path></svg>
            <span class="text-[10px] font-black mt-1 uppercase text-shadow-none">單字卡</span>
        </button>
        <button onclick="switchView('challenges')" class="nav-item flex flex-col items-center p-2 text-gray-400">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10z"></path></svg>
            <span class="text-[10px] font-black mt-1 uppercase text-shadow-none">關卡挑戰</span>
        </button>
        <button onclick="switchView('logs')" class="nav-item flex flex-col items-center p-2 text-gray-400">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"></path></svg>
            <span class="text-[10px] font-black mt-1 uppercase text-shadow-none">學習日誌</span>
        </button>
    </nav>

    <!-- 提示框 -->
    <div id="toast" class="fixed top-24 left-1/2 transform -translate-x-1/2 z-[100] hidden transition-all duration-300">
        <div class="bg-white border-4 border-cyan-400 rounded-2xl px-6 py-3 shadow-2xl font-bold text-center min-w-[200px]">
            <p id="toast-msg" class="text-cyan-600 text-shadow-none"></p>
        </div>
    </div>

    <!-- 結算彈窗 -->
    <div id="game-modal" class="fixed inset-0 bg-black/60 z-[200] hidden flex items-center justify-center p-6 text-shadow-none">
        <div class="bg-white rounded-3xl w-full max-w-sm overflow-hidden border-8 border-cyan-300 shadow-2xl text-shadow-none text-shadow-none">
            <div class="bg-cyan-300 p-6 text-center text-shadow-none text-shadow-none"><h2 class="text-3xl font-black text-white italic text-shadow-none text-shadow-none">關卡完成！</h2></div>
            <div class="p-6 text-center text-shadow-none text-shadow-none text-shadow-none">
                <div id="game-results" class="space-y-2 mb-6 text-center text-shadow-none text-shadow-none text-shadow-none"></div>
                <div class="bg-pink-50 rounded-2xl p-4 mb-6 text-shadow-none text-shadow-none text-shadow-none"><p class="text-pink-600 font-bold italic text-sm text-shadow-none text-shadow-none text-shadow-none" id="teacher-comment"></p></div>
                <button onclick="closeModal()" class="w-full bg-yellow-400 py-4 rounded-2xl font-black text-xl shadow-lg btn-bounce text-white text-shadow-none text-shadow-none">繼續挑戰！</button>
            </div>
        </div>
    </div>

    <script>
        const vocabData = [
            // 已移除內容有誤的 content 
            {id:2, word:'nevertheless', pos:'adv.', ch:'然而，儘管如此'},
            {id:3, word:'concept', pos:'n.', ch:'概念，觀念'},
            {id:4, word:'pronounce', pos:'vt.', ch:'發……的音，發音'},
            {id:5, word:'pronunciation', pos:'n.', ch:'發音'},
            {id:6, word:'atmosphere', pos:'n.', ch:'氣氛，氛圍'},
            {id:7, word:'fascinated', pos:'adj.', ch:'著迷的'},
            {id:8, word:'fascinate', pos:'vt.', ch:'使著迷'},
            {id:9, word:'sigh', pos:'vi.; vt. / n.', ch:'嘆氣，嘆息'},
            {id:10, word:'roughly', pos:'adv.', ch:'大約，約略地'},
            {id:11, word:'rough', pos:'adj.', ch:'約略的'},
            {id:12, word:'passive', pos:'adj.', ch:'消極的，被動的'},
            {id:13, word:'encounter', pos:'vt.', ch:'遭遇，遇到'}, // 第一階段結束 (index 0-11)
            {id:14, word:'frustration', pos:'n.', ch:'挫折，沮喪'}, // 第二階段開始 (index 12-25)
            {id:15, word:'frustrate', pos:'vt.', ch:'使挫折，使沮喪'},
            {id:16, word:'devote', pos:'vt.', ch:'奉獻……'},
            {id:17, word:'devoted', pos:'adj.', ch:'熱愛……的，奉獻於……'},
            {id:18, word:'remaining', pos:'adj.', ch:'剩下的'},
            {id:19, word:'remain', pos:'vi.', ch:'繼續存在；保持不變'},
            {id:20, word:'stubborn', pos:'adj.', ch:'固執的，倔強的'},
            {id:21, word:'stuff', pos:'n.', ch:'事情；東西'},
            {id:22, word:'try out', pos:'phrase', ch:'試驗，試用'},
            {id:23, word:'put...into practice', pos:'phrase', ch:'將……付諸實行'},
            {id:24, word:'let go of sth', pos:'phrase', ch:'放下……'},
            {id:25, word:'look forward to', pos:'phrase', ch:'期待，盼望'},
            {id:26, word:'in other words', pos:'phrase', ch:'換句話說，也就是說'},
            {id:27, word:'do one’s best', pos:'phrase', ch:'全力以赴，盡全力'}
        ];

        let userStats = { learned: [], wordTracking: {}, goodPronunciations: [], highScores: { reflex: 0, memory: 999, spelling: 0 } };

        let currentFlashcardStage = 1;
        let currentCardIndex = 0;
        let isRecording = false;
        let recognition;
        let audioCtx;
        let recordTimeout;

        function initAudioContext() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSuccessSound() {
            initAudioContext();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function playErrorSound() {
            initAudioContext();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'square'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        function loadStats() {
            const saved = localStorage.getItem('dopamine_stats');
            if (saved) userStats = JSON.parse(saved);
        }

        function saveStats() {
            localStorage.setItem('dopamine_stats', JSON.stringify(userStats));
        }

        window.onload = () => {
            loadStats();
            checkCompatibility();
            switchView('flashcards');
        };

        function initSpeech() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return;
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;
            recognition.maxAlternatives = 5;
            recognition.onresult = (event) => {
                const results = Array.from(event.results[0]);
                const filtered = getFilteredFlashcards();
                processPronunciation(results.map(r => r.transcript), filtered[currentCardIndex].word.toLowerCase());
            };
            recognition.onerror = () => stopRecordingState();
            recognition.onend = () => { if(isRecording) stopRecordingState(); };
        }

        function checkCompatibility() {
            const isSupported = 'webkitSpeechRecognition' in window || 'SpeechRecognition' in window;
            if (!isSupported) document.getElementById('compatibility-warning').classList.remove('hidden');
        }

        function switchView(view) {
            document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(v => v.classList.replace('text-pink-500', 'text-gray-400'));
            const target = document.getElementById(`view-${view}`);
            if (target) target.classList.remove('hidden');
            const navItems = document.querySelectorAll('.nav-item');
            if (view === 'flashcards') { navItems[0].classList.replace('text-gray-400', 'text-pink-500'); renderFlashcards(); }
            else if (view === 'challenges') { navItems[1].classList.replace('text-gray-400', 'text-pink-500'); renderChallenges(); }
            else if (view === 'logs') { navItems[2].classList.replace('text-gray-400', 'text-pink-500'); renderLogs(); }
        }

        function getFilteredFlashcards() {
            // content 移除後，第一階段變為前 12 個，其餘為第二階段
            return currentFlashcardStage === 1 ? vocabData.slice(0, 12) : vocabData.slice(12);
        }

        function setFlashcardStage(stage) {
            currentFlashcardStage = stage; currentCardIndex = 0; renderFlashcards();
        }

        function renderFlashcards() {
            const container = document.getElementById('view-flashcards');
            const filtered = getFilteredFlashcards();
            const word = filtered[currentCardIndex];
            if (!userStats.wordTracking[word.id]) userStats.wordTracking[word.id] = {views: 0, listens: 0};
            userStats.wordTracking[word.id].views++;
            checkLearningStatus(word.id);

            let wordFontSize = word.word.length > 15 ? "text-3xl md:text-5xl" : (word.word.length > 10 ? "text-4xl md:text-6xl" : "text-5xl md:text-7xl");

            container.innerHTML = `
                <div class="flex flex-col items-center text-shadow-none">
                    <div class="flex w-full max-w-md bg-gray-200 rounded-3xl p-1 mb-8 border-2 border-gray-100 shadow-inner">
                        <button onclick="setFlashcardStage(1)" class="flex-1 py-3 rounded-2xl font-black text-sm transition-all ${currentFlashcardStage === 1 ? 'bg-white text-pink-500 shadow-md scale-[1.02]' : 'text-gray-500'}">第一階段</button>
                        <button onclick="setFlashcardStage(2)" class="flex-1 py-3 rounded-2xl font-black text-sm transition-all ${currentFlashcardStage === 2 ? 'bg-white text-cyan-500 shadow-md scale-[1.02]' : 'text-gray-500'}">第二階段</button>
                    </div>

                    <div class="w-full max-w-lg flex justify-between items-center mb-6 px-4">
                        <span class="bg-yellow-300 text-pink-600 font-black px-4 py-1 rounded-full text-xs md:text-sm shadow-sm text-shadow-none">單字進度 ${currentCardIndex + 1}/${filtered.length}</span>
                        ${userStats.learned.includes(word.id) ? '<span class="text-green-500 font-black text-sm md:text-base animate-bounce text-shadow-none">✨ 已學會</span>' : ''}
                    </div>

                    <div id="flashcard" class="relative w-full aspect-[4/5] md:aspect-[5/4] perspective-1000 cursor-pointer text-shadow-none" onclick="flipCard()">
                        <div class="card-inner w-full h-full relative duration-500 shadow-2xl rounded-[3rem] border-8 border-white text-shadow-none">
                            <div class="card-front absolute inset-0 dopamine-gradient rounded-[2.5rem] flex flex-col items-center justify-center p-8 text-center text-shadow-none">
                                <h2 class="${wordFontSize} font-black text-gray-800 w-full mb-6 leading-tight break-keep text-shadow-none" style="word-break: keep-all;">${word.word}</h2>
                                <p class="text-xl md:text-2xl font-bold text-pink-500 italic uppercase tracking-widest text-shadow-none text-shadow-none">${word.pos}</p>
                                <p class="mt-12 text-gray-400 text-xs md:text-sm font-bold tracking-widest uppercase italic animate-pulse text-shadow-none">點擊翻面</p>
                            </div>
                            <div class="card-back absolute inset-0 bg-white rounded-[2.5rem] flex flex-col items-center justify-center p-8 text-center overflow-hidden text-shadow-none">
                                <h2 class="text-4xl md:text-5xl font-black text-pink-500 w-full px-4 text-shadow-none" style="word-break: break-all;">${word.ch}</h2>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-4 gap-4 w-full max-w-lg mt-10">
                        <button onclick="prevCard(event)" class="bg-white border-4 border-gray-100 p-5 rounded-[2rem] flex items-center justify-center btn-bounce shadow-md"><svg class="w-8 h-8 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg></button>
                        <button onclick="playAudio(event)" title="播放發音" class="bg-yellow-400 border-4 border-yellow-200 p-5 rounded-[2rem] flex items-center justify-center btn-bounce shadow-lg text-white"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg></button>
                        <button id="mic-btn" onclick="toggleMic(event)" title="錄音跟讀" class="bg-pink-500 shadow-lg p-5 rounded-[2rem] flex items-center justify-center btn-bounce relative text-white"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 10v1a7 7 0 01-14 0v-1m7 11v-4m-3 4h6"></path></svg><div id="recording-pulse" class="absolute inset-0 rounded-[2rem] bg-pink-400 animate-ping hidden text-shadow-none text-shadow-none"></div></button>
                        <button onclick="nextCard(event)" class="bg-white border-4 border-cyan-300 p-5 rounded-[2rem] flex items-center justify-center btn-bounce shadow-md"><svg class="w-8 h-8 text-cyan-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg></button>
                    </div>

                    <div id="pronounce-feedback" class="mt-8 w-full max-w-lg hidden text-shadow-none text-shadow-none">
                        <div class="bg-white rounded-[2.5rem] p-6 border-4 border-dashed border-cyan-100 flex flex-col items-center text-center shadow-sm text-shadow-none">
                            <p id="heard-display" class="text-sm text-gray-400 font-bold mb-2 text-shadow-none"></p>
                            <p id="sim-score" class="text-2xl font-black mb-0 text-shadow-none"></p>
                        </div>
                    </div>
                </div>
            `;
        }

        function flipCard() { document.getElementById('flashcard').classList.toggle('card-flipped'); }
        function nextCard(e) { e.stopPropagation(); const filtered = getFilteredFlashcards(); if(currentCardIndex < filtered.length - 1) { currentCardIndex++; renderFlashcards(); } }
        function prevCard(e) { e.stopPropagation(); if(currentCardIndex > 0) { currentCardIndex--; renderFlashcards(); } }

        function playAudio(e) {
            e.stopPropagation(); initAudioContext();
            const filtered = getFilteredFlashcards();
            const word = filtered[currentCardIndex];
            const utter = new SpeechSynthesisUtterance(word.speakText || word.word);
            utter.lang = 'en-US'; utter.rate = 0.85;
            window.speechSynthesis.speak(utter);
            userStats.wordTracking[word.id].listens++;
            checkLearningStatus(word.id);
        }

        function checkLearningStatus(id) {
            const track = userStats.wordTracking[id];
            if (track.views >= 2 && track.listens >= 1 && !userStats.learned.includes(id)) { userStats.learned.push(id); showToast("✨ 成功學會一個新單字！"); }
            saveStats();
        }

        function toggleMic(e) {
            e.stopPropagation(); initAudioContext(); initSpeech();
            if (isRecording) return;
            isRecording = true; document.getElementById('recording-pulse').classList.remove('hidden');
            try { recognition.start(); } catch(err) {}
            recordTimeout = setTimeout(stopRecordingState, 5000);
        }

        function stopRecordingState() {
            isRecording = false; clearTimeout(recordTimeout);
            const p = document.getElementById('recording-pulse'); if(p) p.classList.add('hidden');
            if (recognition) try { recognition.stop(); } catch(e){}
        }

        function processPronunciation(heardList, target) {
            const clean = (s) => s.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").trim();
            const targetClean = clean(target);
            const targetWords = targetClean.split(" ");
            let bestScore = 0; let bestHeard = heardList[0];

            heardList.forEach(raw => {
                const h = clean(raw);
                let hit = 0; targetWords.forEach(tw => { if(h.includes(tw)) hit++; });
                const score = (hit / targetWords.length) * 100;
                if(score > bestScore) { bestScore = score; bestHeard = raw; }
            });

            const feedback = document.getElementById('pronounce-feedback');
            const scoreDisplay = document.getElementById('sim-score');
            const heardDisplay = document.getElementById('heard-display');
            feedback.classList.remove('hidden');
            heardDisplay.innerText = `剛才聽到的文字： "${bestHeard}"`;

            if (bestScore >= 30) {
                playSuccessSound();
                scoreDisplay.innerText = bestScore >= 75 ? "Excellent! ✨ 真完美！" : "Good! 👍 系統聽懂了！";
                scoreDisplay.className = "text-2xl font-black text-green-500 text-shadow-none";
                const filtered = getFilteredFlashcards();
                if (!userStats.goodPronunciations.includes(filtered[currentCardIndex].id)) {
                    userStats.goodPronunciations.push(filtered[currentCardIndex].id); saveStats();
                }
            } else {
                playErrorSound();
                scoreDisplay.innerText = "Try again! 🎤 再試一次吧！";
                scoreDisplay.className = "text-2xl font-black text-red-400 text-shadow-none";
            }
        }

        function renderChallenges() {
            const container = document.getElementById('view-challenges');
            container.innerHTML = `
                <div class="space-y-8 py-4 text-shadow-none">
                    <h2 class="text-4xl md:text-5xl font-black text-gray-800 italic uppercase tracking-tighter">單字競技場</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div onclick="selectStageMenu(1)" class="bg-white border-b-8 border-pink-400 p-8 rounded-[3rem] cursor-pointer btn-bounce shadow-md">
                            <h3 class="text-2xl font-black text-pink-500">眼明手快</h3><p class="text-gray-400 text-xs font-bold mt-1">Reflex</p>
                        </div>
                        <div onclick="selectStageMenu(2)" class="bg-white border-b-8 border-cyan-400 p-8 rounded-[3rem] cursor-pointer btn-bounce shadow-md">
                            <h3 class="text-2xl font-black text-cyan-500">記憶配對</h3><p class="text-gray-400 text-xs font-bold mt-1">Memory</p>
                        </div>
                        <div onclick="selectStageMenu(3)" class="bg-white border-b-8 border-yellow-400 p-8 rounded-[3rem] cursor-pointer btn-bounce shadow-md">
                            <h3 class="text-2xl font-black text-yellow-600">拼字大師</h3><p class="text-gray-400 text-xs font-bold mt-1">Spelling</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function selectStageMenu(lv) {
            document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden'));
            const gameView = document.getElementById('view-game');
            gameView.classList.remove('hidden');
            gameView.innerHTML = `
                <div class="py-12 text-center space-y-12">
                    <button onclick="switchView('challenges')" class="text-gray-300 font-black text-xs uppercase flex items-center justify-center w-full"><svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> 返回</button>
                    <h2 class="text-3xl font-black text-gray-800 italic uppercase">選擇挑戰範圍</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-2xl mx-auto text-shadow-none">
                        <button onclick="startLevelWithStage(${lv}, 1)" class="p-12 bg-white border-b-8 border-pink-400 rounded-[4rem] btn-bounce shadow-xl text-shadow-none"><p class="text-3xl font-black text-pink-500">第一階段</p><p class="text-gray-400 text-sm font-bold mt-2 text-shadow-none">nevertheless 到 encounter</p></button>
                        <button onclick="startLevelWithStage(${lv}, 2)" class="p-12 bg-white border-b-8 border-cyan-400 rounded-[4rem] btn-bounce shadow-xl text-shadow-none"><p class="text-3xl font-black text-cyan-500">第二階段</p><p class="text-gray-400 text-sm font-bold mt-2 text-shadow-none">frustration 到 do one's best</p></button>
                    </div>
                </div>
            `;
        }

        function startLevelWithStage(lv, stage) {
            const data = stage === 1 ? vocabData.slice(0, 12) : vocabData.slice(12);
            const gameView = document.getElementById('view-game');
            if (lv === 1) initReflex(gameView, data);
            if (lv === 2) initMemory(gameView, data);
            if (lv === 3) initSpelling(gameView, data);
        }

        function initReflex(view, data) {
            let score = 0; let q = 0; const quiz = [...data].sort(() => 0.5 - Math.random()).slice(0, 10);
            const next = () => {
                if (q >= quiz.length) { endGame('Reflex', score, "你的反應快得像閃電！⚡"); return; }
                const target = quiz[q];
                const opts = [...data.filter(v => v.id !== target.id).sort(() => 0.5-Math.random()).slice(0,3), target].sort(() => 0.5-Math.random());
                view.innerHTML = `<div class="py-4 text-shadow-none"><button onclick="switchView('challenges')" class="mb-6 text-gray-300 font-black text-xs uppercase flex items-center"><svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> 離開</button><div class="flex justify-between items-end mb-8"><span class="text-4xl font-black text-pink-500 italic text-shadow-none">SCORE: ${score}</span><span class="text-gray-400 font-black text-sm uppercase">題次 ${q+1}/${quiz.length}</span></div><div class="bg-white py-20 rounded-[4rem] border-8 border-pink-100 text-center mb-10 shadow-xl text-shadow-none"><h2 class="text-6xl md:text-8xl font-black text-gray-800 break-words px-4 text-shadow-none" style="word-break: keep-all;">${target.word}</h2></div><div class="grid grid-cols-1 md:grid-cols-2 gap-4">${opts.map(o => `<button onclick="this.disabled=true; checkR(this, ${o.id===target.id})" class="w-full bg-white p-6 rounded-3xl border-4 border-gray-100 font-bold text-xl md:text-2xl btn-bounce hover:border-pink-300 text-shadow-none">${o.ch}</button>`).join('')}</div></div>`;
            };
            window.checkR = (b, c) => { if(c) { playSuccessSound(); score += 100; b.classList.replace('border-gray-100', 'border-green-400'); } else { playErrorSound(); b.classList.replace('border-gray-100', 'border-red-400'); } q++; setTimeout(next, 600); };
            next();
        }

        function initMemory(view, data) {
            const count = data.length >= 8 ? 8 : data.length;
            const words = [...data].sort(() => 0.5 - Math.random()).slice(0, count);
            let cards = []; words.forEach(w => { cards.push({id: w.id, t: w.word, type: 'en', matched: false}); cards.push({id: w.id, t: w.ch, type: 'ch', matched: false}); });
            cards.sort(() => 0.5 - Math.random());
            let sel = []; let matchedCount = 0; let time = 0; const timer = setInterval(() => time++, 1000);
            const render = () => {
                view.innerHTML = `<div class="py-4 text-shadow-none text-shadow-none text-shadow-none"><button onclick="clearInterval(${timer}); switchView('challenges')" class="mb-6 text-gray-300 font-black text-xs uppercase flex items-center text-shadow-none"><svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> 離開</button><div class="flex justify-between items-center mb-8 text-shadow-none"><h3 class="text-3xl font-black text-cyan-500 italic text-shadow-none">TIME: ${time}s</h3></div><div class="grid grid-cols-4 gap-2 md:gap-4 max-w-2xl mx-auto">${cards.map((c, i) => `<div onclick="selM(${i})" id="mc-${i}" class="h-28 md:h-40 bg-white rounded-[1.5rem] md:rounded-[2rem] border-2 md:border-4 ${c.matched ? 'border-green-200 opacity-20 shadow-none' : 'border-gray-100 shadow-md'} flex items-center justify-center px-1 md:px-2 text-center transition-all active:scale-95 cursor-pointer overflow-hidden"><span class="game-card-text font-black leading-tight ${c.matched ? 'text-green-500' : 'text-gray-700'} text-shadow-none">${c.t}</span></div>`).join('')}</div></div>`;
            };
            window.selM = (i) => {
                if (sel.length >= 2 || cards[i].matched || sel.includes(i)) return;
                sel.push(i); const el = document.getElementById(`mc-${i}`); if (el) el.classList.add('border-cyan-400', 'bg-cyan-50', 'scale-105', 'z-10');
                if (sel.length === 2) {
                    const [a, b] = sel;
                    if (cards[a].id === cards[b].id && cards[a].type !== cards[b].type) {
                        playSuccessSound(); cards[a].matched = cards[b].matched = true; matchedCount += 2;
                        setTimeout(() => { sel = []; render(); if (matchedCount === cards.length) { clearInterval(timer); endGame('Memory', time, "你的記憶力簡直無懈可擊！🤖"); } }, 400);
                    } else {
                        playErrorSound(); setTimeout(() => {
                            const elA = document.getElementById(`mc-${a}`); const elB = document.getElementById(`mc-${b}`);
                            if(elA) { elA.classList.remove('border-cyan-400', 'bg-cyan-50'); elA.classList.add('border-red-300', 'bg-red-50'); }
                            if(elB) { elB.classList.remove('border-cyan-400', 'bg-cyan-50'); elB.classList.add('border-red-300', 'bg-red-50'); }
                            setTimeout(() => { sel = []; render(); }, 400);
                        }, 500);
                    }
                }
            };
            render();
        }

        function initSpelling(view, data) {
            let score = 0; let q = 0; const quiz = [...data].sort(() => 0.5 - Math.random()).slice(0, 5);
            const next = () => {
                if (q >= quiz.length) { endGame('Spelling', score, "拼寫大師非你莫屬！🧠"); return; }
                const target = quiz[q];
                view.innerHTML = `<div class="py-4 text-shadow-none"><button onclick="switchView('challenges')" class="mb-6 text-gray-300 font-black text-xs uppercase flex items-center text-shadow-none"><svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> 離開</button><div class="flex justify-between mb-8"><span class="text-4xl font-black text-yellow-500 italic text-shadow-none">SCORE: ${score}</span><span class="text-gray-400 font-black text-sm uppercase text-shadow-none">Q ${q+1}/${quiz.length}</span></div><div id="spelling-card" class="bg-white py-20 rounded-[4rem] border-8 border-yellow-100 text-center mb-10 shadow-xl text-shadow-none"><p class="text-pink-400 font-black text-lg mb-2 uppercase text-shadow-none">${target.pos}</p><h2 class="text-4xl md:text-6xl font-black text-gray-800 break-words px-4 text-shadow-none" style="word-break: break-all;">${target.ch}</h2></div><input type="text" id="spell-in" autocomplete="off" autofocus class="w-full max-w-xl mx-auto block bg-white border-4 border-yellow-300 p-8 rounded-[2.5rem] text-center text-3xl md:text-4xl font-black outline-none mb-10 shadow-inner text-shadow-none" placeholder="TYPE HERE"><button id="spell-btn" onclick="checkS()" class="w-full max-w-xl mx-auto block bg-yellow-400 py-6 rounded-[2.5rem] font-black text-2xl text-white shadow-lg btn-bounce text-shadow-none">提交答案</button></div>`;
                setTimeout(() => { const input = document.getElementById('spell-in'); if(input) input.focus(); }, 100);
            };
            window.checkS = () => {
                const input = document.getElementById('spell-in'); const btn = document.getElementById('spell-btn');
                if (!input || btn.disabled) return; btn.disabled = true;
                if (input.value.trim().toLowerCase() === quiz[q].word.toLowerCase()) {
                    playSuccessSound(); score += 200; input.classList.add('border-green-400', 'bg-green-50', 'animate-success');
                    setTimeout(() => { q++; next(); }, 1000);
                } else {
                    playErrorSound(); input.classList.add('border-red-400', 'bg-red-50', 'animate-shake'); showToast(`正確答案：${quiz[q].word}`);
                    setTimeout(() => { q++; next(); }, 1500);
                }
            };
            next();
        }

        function renderLogs() {
            const container = document.getElementById('view-logs');
            const percent = Math.round((userStats.learned.length / vocabData.length) * 100);
            const learnedWordList = userStats.learned.map(id => vocabData.find(v => v.id === id)?.word).filter(Boolean);
            container.innerHTML = `<div class="py-4 space-y-12 text-shadow-none"><div class="flex items-center justify-between"><h2 class="text-4xl md:text-5xl font-black text-gray-800 italic uppercase tracking-tighter text-shadow-none">學習日誌</h2><button onclick="resetStats()" class="bg-red-50 text-red-400 px-4 py-2 rounded-full text-[10px] font-black uppercase hover:bg-red-100 transition-colors text-shadow-none">清除紀錄</button></div><div class="bg-white rounded-[3rem] p-12 border-b-8 border-pink-300 shadow-sm relative overflow-hidden"><div class="relative z-10 flex items-center justify-between text-shadow-none"><div class="text-left text-shadow-none"><h3 class="text-gray-400 font-black text-sm uppercase tracking-widest mb-2 text-shadow-none">掌握程度</h3><div class="text-6xl md:text-7xl font-black text-pink-500 text-shadow-none">${percent}%</div></div><div class="w-24 h-24 border-8 border-pink-50 rounded-full flex items-center justify-center shadow-inner bg-pink-50/30 text-shadow-none"><span class="text-pink-500 font-black text-3xl text-shadow-none">${userStats.learned.length}</span></div></div><div class="w-full bg-gray-50 h-5 rounded-full mt-10 overflow-hidden shadow-inner text-shadow-none"><div class="bg-pink-400 h-full transition-all duration-1000 shadow-[0_0_10px_rgba(236,72,153,0.3)] text-shadow-none" style="width: ${percent}%"></div></div><div class="mt-12 text-shadow-none"><h4 class="text-xs text-gray-400 font-black uppercase tracking-widest mb-4 italic text-shadow-none">已學會的單字清單</h4><div class="flex flex-wrap gap-3 text-shadow-none">${learnedWordList.length === 0 ? '<p class="text-gray-300 text-sm italic text-shadow-none">快去挑戰單字卡吧！</p>' : learnedWordList.map(w => `<span class="bg-pink-50 text-pink-500 px-4 py-2 rounded-2xl text-xs md:text-sm font-black border-2 border-pink-100 uppercase tracking-tighter shadow-sm hover:scale-110 transition-transform cursor-default text-shadow-none">${w}</span>`).join('')}</div></div></div><div class="grid grid-cols-1 md:grid-cols-2 gap-8 text-shadow-none text-shadow-none"><div class="bg-white rounded-[3rem] p-8 shadow-sm border-b-8 border-cyan-300 h-full text-shadow-none"><h4 class="font-black text-gray-700 text-sm mb-6 uppercase tracking-tighter flex items-center text-shadow-none"><span class="mr-2 text-xl text-shadow-none">🏆</span> 發音成就館</h4><div class="flex flex-wrap gap-2 text-shadow-none">${userStats.goodPronunciations.length === 0 ? '<p class="text-gray-300 text-xs italic py-2 text-shadow-none">快去練習發音吧！</p>' : userStats.goodPronunciations.map(id => { const w = vocabData.find(v => v.id === id); return `<span class="bg-cyan-50 text-cyan-600 px-3 py-1 rounded-xl text-[10px] md:text-xs font-black border border-cyan-100 uppercase text-shadow-none">${w.word}</span>`; }).join('')}</div></div><div class="bg-white rounded-[3rem] p-8 shadow-sm border-b-8 border-yellow-300 h-full text-shadow-none"><h4 class="font-black text-gray-700 text-sm mb-6 uppercase tracking-tighter flex items-center text-shadow-none"><span class="mr-2 text-xl text-shadow-none">🎮</span> 闖關名人堂</h4><div class="space-y-4 text-shadow-none"><div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl shadow-inner text-shadow-none text-shadow-none"><span class="text-xs font-black text-gray-400 uppercase text-shadow-none">眼明手快</span><span class="text-lg font-black text-pink-500 text-shadow-none">${userStats.highScores.reflex} 分</span></div><div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl shadow-inner text-shadow-none"><span class="text-xs font-black text-gray-400 uppercase text-shadow-none">記憶配對</span><span class="text-lg font-black text-cyan-500 text-shadow-none">${userStats.highScores.memory === 999 ? '-' : userStats.highScores.memory + ' 秒'}</span></div><div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl shadow-inner text-shadow-none"><span class="text-xs font-black text-gray-400 uppercase text-shadow-none">拼字大師</span><span class="text-lg font-black text-yellow-600 text-shadow-none">${userStats.highScores.spelling} 分</span></div></div></div></div></div>`;
        }

        function showToast(msg) { const toast = document.getElementById('toast'); document.getElementById('toast-msg').innerText = msg; toast.classList.remove('hidden'); setTimeout(() => toast.classList.add('hidden'), 3000); }
        function endGame(level, score, comment) { const modal = document.getElementById('game-modal'); const resDiv = document.getElementById('game-results'); if (level === 'Reflex' && score > userStats.highScores.reflex) userStats.highScores.reflex = score; if (level === 'Memory' && score < userStats.highScores.memory) userStats.highScores.memory = score; if (level === 'Spelling' && score > userStats.highScores.spelling) userStats.highScores.spelling = score; saveStats(); resDiv.innerHTML = `<div class="text-gray-300 font-black uppercase text-xs mb-2 tracking-widest text-center text-shadow-none">本次成績</div><div class="text-6xl font-black text-gray-800 text-center text-shadow-none">${level === 'Memory' ? score + 's' : score}</div>`; document.getElementById('teacher-comment').innerText = comment; modal.classList.remove('hidden'); }
        function closeModal() { document.getElementById('game-modal').classList.add('hidden'); switchView('challenges'); }
        function resetStats() { if (confirm("確定要刪除所有紀錄嗎？")) { localStorage.removeItem('dopamine_stats'); location.reload(); } }
    </script>
</body>
</html>
